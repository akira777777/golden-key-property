name: Golden Key CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: golden_key_test
          POSTGRES_USER: golden_key
          POSTGRES_PASSWORD: test-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U golden_key -d golden_key_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Verify PostgreSQL migrations
        env:
          DATABASE_URL: postgresql://golden_key:test-only@127.0.0.1:5432/golden_key_test
        run: |
          python -m alembic -c alembic.ini upgrade head
          python seed_demo.py

      - name: Run tests
        run: python -m pytest -q

      - name: Check compile
        run: python -m compileall -q .

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Compose stack
        run: docker compose build
      - name: Run health check
        run: |
          docker compose up -d
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker compose down
