version: "3.9"

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - PROPERTY_LISTINGS_DB_PATH=/data/property_listings.db
      - ALLOWED_ORIGINS=http://localhost:8000,http://127.0.0.1:8000
      - RATE_LIMIT_MAX=5
      - RATE_LIMIT_WINDOW=60
    volumes:
      - api-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  api-data:
