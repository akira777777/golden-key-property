services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: golden_key
      POSTGRES_USER: golden_key
      POSTGRES_PASSWORD: local-development-only
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golden_key -d golden_key"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    command: ["sh", "-c", "python -m alembic -c alembic.ini upgrade head && python seed_demo.py && uvicorn main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://golden_key:local-development-only@db:5432/golden_key
      ENVIRONMENT: development
      SITE_URL: http://127.0.0.1:8000
      ALLOWED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
      RATE_LIMIT_MAX: 5
      RATE_LIMIT_WINDOW: 60
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres-data:
