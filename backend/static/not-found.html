<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f2b25" />
    <title>Not found — Golden Key</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/styles.css" />
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 2rem;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #fbf7ef;
        color: #0f2b25;
      }
      main {
        max-width: 32rem;
        text-align: center;
      }
      h1 {
        font-size: clamp(2rem, 6vw, 3rem);
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0 0 1.5rem;
        line-height: 1.6;
      }
      a.button {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        background: #0f2b25;
        color: #fbf7ef;
        text-decoration: none;
        border-radius: 6px;
      }
      a.button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <main>
      <p>404</p>
      <h1>Page not found</h1>
      <p>The page you’re looking for doesn’t exist or has been moved. Return to the catalogue to keep browsing curated listings.</p>
      <a class="button" href="/">Back to listings</a>
    </main>
  </body>
</html>
